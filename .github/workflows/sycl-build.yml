name: Windows SYCL On-Demand Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration type'
        required: true
        default: 'Release'
        type: choice
        options:
        - Release
        - Debug

jobs:
  build-sycl-windows:
    runs-on: windows-latest

    steps:
    - name: Clone Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Intel oneAPI Base Toolkit
      run: |
        # Download and silently install the minimal components needed for DPCPP/SYCL
        invoke-webrequest -Uri "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/204cb080-6bc7-4d6d-bfda-96695286596a/w_BaseKit_p_2024.1.0.596_offline.exe" -OutFile "oneapi_base.exe"
        Start-Process -FilePath ".\oneapi_base.exe" -ArgumentList "--action install --silent --eula accept --components intel.oneapi.win.dpcpp-ct" -Wait
        Remove-Item "oneapi_base.exe"

    - name: Configure CMake with SYCL Backend
      run: |
        # Source the Intel environment variables prior to generating the build matrix
        cmd.exe /c "call `"${env:ProgramFiles(x86)}\Intel\oneAPI\setvars.bat`" && cmake -B build -G '"Visual Studio 17 2022"' -A x64 -DLLAMA_SYCL=ON -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }}"

    - name: Execute Compilation
      run: |
        cmd.exe /c "call `"${env:ProgramFiles(x86)}\Intel\oneAPI\setvars.bat`" && cmake --build build --config ${{ github.event.inputs.build_type }} -j $env:NUMBER_OF_PROCESSORS"

    - name: Compress and Stage Binaries
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path .\llama-sycl-windows-x64
        Copy-Item -Path .\build\bin\${{ github.event.inputs.build_type }}\*.exe -Destination .\llama-sycl-windows-x64\
        Copy-Item -Path .\build\bin\${{ github.event.inputs.build_type }}\*.dll -Destination .\llama-sycl-windows-x64\ -ErrorAction SilentlyContinue
        Compress-Archive -Path .\llama-sycl-windows-x64\* -DestinationPath .\llama-sycl-windows-x64.zip

    - name: Publish Downloadable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-sycl-windows-x64-${{ github.event.inputs.build_type }}
        path: llama-sycl-windows-x64.zip
        retention-days: 5
