name: Build llama.cpp with SYCL Support

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux-sycl:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add Intel oneAPI Repository
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.pub \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/intel-sw-products.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/intel-sw-products.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneapi.list

          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y \
            intel-oneapi-compiler-dpcpp-cpp \
            intel-oneapi-runtime-dpcpp-cpp \
            intel-oneapi-mkl-devel \
            ninja-build \
            build-essential \
            cmake

      - name: Configure
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=icx \
            -DCMAKE_CXX_COMPILER=icpx \
            -DGGML_SYCL=ON \
            -DGGML_SYCL_F16=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh --force
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p artifacts

          find build/bin -type f -executable -exec cp {} artifacts/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-linux-sycl
          path: artifacts/
          retention-days: 5
